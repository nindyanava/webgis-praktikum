<!DOCTYPE html>
<html>

<head>
    <title>Geospatial Mashup</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map {
            width: 100%;
            height: 600px;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script>
        // --- Inisialisasi Peta ---
        var mymap = L.map('map').setView([-7.666001, 110.418420], 14);
        // --- Basemap OpenStreetMap ---
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">' +
                'OpenStreetMap</a> contributors'
        }).addTo(mymap);
        // --- Marker (Objek Titik) ---
        var marker = L.marker([-7.6660001, 110.418420]).addTo(mymap);
        marker.bindPopup('<b>Lokasi A</b><br>Deskripsi lokasi.');
        // --- Circle (Objek Lingkaran) ---
        var circle = L.circle([-7.668886, 110.428708], {
            color: '#FF1493', fillColor: '#FFC0CB',
            fillOpacity: 0.5, radius: 200
        }).addTo(mymap);
        circle.bindPopup('Radius 200 m dari titik ini.');
        // --- Polygon (Objek Area) ---
        var polygon = L.polygon([
            [-7.68113, 110.405822], [-7.663336, 110.412928],
            [-7.659538, 110.395438], [-7.676913, 110.391036]
        ], { color: '#2E8B58', fillColor: '#00FF7F', fillOpacity: 0.3 })
            .addTo(mymap);
        polygon.bindPopup('Area Kawasan A');
        // --- Polyline (Objek Garis) ---
        var polyline = L.polyline([
            [-7.682778, 110.419555], [-7.678259, 110.417517],
            [-7.667438, 110.417773]
        ], { color: '#FF0000', weight: 3, opacity: 0.8 })
            .addTo(mymap);
        polyline.bindPopup('Jalur A');
    </script>
</body>

</html>
