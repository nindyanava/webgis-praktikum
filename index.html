<!DOCTYPE html>
<html>

<head>
    <title>Geospatial Mashup</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map {
            width: 100%;
            height: 600px;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script>
        // --- Inisialisasi Peta ---
        var mymap = L.map('map').setView([-7.666001, 110.418420], 14);
        // --- Basemap OpenStreetMap ---
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">' +
                'OpenStreetMap</a> contributors'
        }).addTo(mymap);
        // --- Marker (Objek Titik) ---
        var marker = L.marker([48.85828227942401, 2.294486422810323]).addTo(mymap);
        marker.bindPopup('<b>Lokasi A</b><br>Deskripsi lokasi.');
        // --- Circle (Objek Lingkaran) ---
        var circle = L.circle([48.85828227942401, 2.294486422810323], {
            color: '#FF1493', fillColor: '#FFC0CB',
            fillOpacity: 0.5, radius: 500
        }).addTo(mymap);
        circle.bindPopup('Radius 500 m dari titik ini.');
        // --- Polygon (Objek Area) ---
        var polygon = L.polygon([
            [48.851160640434834, 2.3008891692899587], [48.854291506522074, 2.3052615497213345],
            [48.86042359996666, 2.2956799765853275], [48.85742591522142, 2.291244943718353]
        ], { color: '#2E8B58', fillColor: '#00FF7F', fillOpacity: 0.3 })
            .addTo(mymap);
        polygon.bindPopup('Area Kawasan A');
        // --- Polyline (Objek Garis) ---
        var polyline = L.polyline([
            [48.85431813266314, 2.305363696254337], [48.85769548400926, 2.3000667574007503],
            [48.862373278562096, 2.3015370035906675]
        ], { color: '#FF0000', weight: 3, opacity: 0.8 })
            .addTo(mymap);
        polyline.bindPopup('Jalur A');
    </script>
</body>

</html>
